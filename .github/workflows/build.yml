name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        java-version: [17, 21]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK ${{ matrix.java-version }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java-version }}
        distribution: 'temurin'
    
    - name: Cache Maven packages
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
    
    - name: Install native dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libx11-dev libxtst-dev
    
    - name: Install native dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        xcode-select --install
    
    - name: Install native dependencies (Windows)
      if: matrix.os == 'windows-latest'
      uses: microsoft/setup-msbuild@v1.3
    
    - name: Build native library (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        mkdir -p build
        gcc -shared -fPIC -o build/libfastrobotultra.so \
          -I${JAVA_HOME}/include -I${JAVA_HOME}/include/linux \
          native/ultrafastrobot_UltraFastRobot.cpp -lX11 -lXtst
    
    - name: Build native library (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        mkdir -p build
        clang -shared -fPIC -o build/libfastrobotultra.dylib \
          -I${JAVA_HOME}/include -I${JAVA_HOME}/include/darwin \
          native/ultrafastrobot_UltraFastRobot.cpp -framework Cocoa -framework IOKit
    
    - name: Build native library (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        mkdir build
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=x64
        cl.exe /LD /O2 /I"%JAVA_HOME%\include" /I"%JAVA_HOME%\include\win32" ^
          native\ultrafastrobot_UltraFastRobot.cpp user32.lib gdi32.lib ^
          /Fe:build\fastrobotultra.dll
    
    - name: Copy native library to resources
      run: |
        if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
          cp build/libfastrobotultra.so src/main/resources/native/
        elif [ "${{ matrix.os }}" = "macos-latest" ]; then
          cp build/libfastrobotultra.dylib src/main/resources/native/
        else
          cp build/fastrobotultra.dll src/main/resources/native/
        fi
    
    - name: Run tests
      run: mvn test
    
    - name: Build package
      run: mvn package
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: ultrafastrobot-${{ matrix.os }}-java${{ matrix.java-version }}
        path: |
          target/*.jar
          target/classes/native/

  release:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Build and deploy to Maven Central
      run: |
        mvn -B -s .github/settings.xml deploy
      env:
        MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
        MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
