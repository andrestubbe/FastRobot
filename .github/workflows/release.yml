name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.3
    
    - name: Build native DLL
      run: |
        mkdir build
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=x64
        cl.exe /LD /O2 /I"%JAVA_HOME%\include" /I"%JAVA_HOME%\include\win32" ^
          native\ultrafastrobot_UltraFastRobot.cpp user32.lib gdi32.lib ^
          /Fe:build\fastrobot.dll
    
    - name: Build JAR with bundled DLL
      run: mvn -B package -DskipTests
    
    - name: Upload Release Assets
      uses: softprops/action-gh-release@v1
      with:
        files: |
          target/fastrobot-*.jar
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
